<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Krantenwijk</title>
	<style>
		body {
			background: #000;
			color: snow;
			font-family: Arial, sans-serif;
			margin: 20px;
		}
		h1 select {
	        background: #002222;
	        color: white;
	        border: 2px solid turquoise;
	        border-radius: 8px;
	        font-size: 22px;
	        padding: 4px 10px;
	        margin-left: 15px;
	        position: relative;     
        }
		h1, h2 {
			color: turquoise;
		}
		h1 {
		padding-bottom: 10px;
		}
		#dayView {
		position: relative;
		bottom: 3px;
		}
		.controls {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			align-items: center;
			margin-bottom: 20px;
		}
		input, select, button {
			height: 40px;
			border: 2px solid turquoise;
			border-radius: 8px;
			background: #002222;
			color: white;
			padding: 0 10px;
			font-size: 16px;
		}
		button {
			cursor: pointer;
		}
		button:hover {
			background: #004444;
		}
		#referenceContainer {
			display: none;
		}
		ul {
			list-style: none;
			padding: 0;
		}
		li {
			width: max-content;
			min-width: 300px;
			height: 30px;
			padding: 8px 15px;
			border: 2px solid turquoise;
			background: #002222;
			border-radius: 10px;
			margin-bottom: 8px;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}
		.houseLeft {
			display: flex;
			align-items: center;
			gap: 10px;
			user-select: none;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
		}
		input[type="checkbox"] {
			width: 22px;
			height: 22px;
		}
		.deleteHouse {
			border-color: red;
			background: #220000;
			height: 35px;
		}
		.deleteHouse:hover {
			background: #550000;
		}
		#importPopup {
	        display: none;
	        position: fixed;
	        inset: 0;
	        background: rgba(0,0,0,0.7);
	        align-items: center;
	        justify-content: center;
	        z-index: 1000;
        }
        .importBox {
	        background: #002222;
	        border: 2px solid turquoise;
	        border-radius: 12px;
	        padding: 20px;
	        width: min(500px, 90%);
        }
        .importBox h2 {
	        margin-top: 0;
        }
        #importText {
	        width: 100%;
	        height: 180px;
	        resize: vertical;
	        box-sizing: border-box;
	        margin-bottom: 15px;
	        background-color: #000000;
	        color: snow; 
        }
        .importOptions {
	        display: flex;
	        gap: 10px;
	        margin-bottom: 15px;
        }
        .importButtons {
	        display: flex;
	        gap: 10px;
        }
        summary.header {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
        }

        summary.header h1 {
            margin: 0;
        }

        summary.header select {
            margin-left: 10px;
        }
	</style>
</head>

<body>
 <details>
	<summary class="header">
            <h1>Krantenwijk</h1>
            <select id="dayView">
                <option value="mawo">Ma-Wo</option>
                <option value="dovr">Do-Vr</option>
                <option value="za">Za</option>
            </select>
        </summary>

	<div class="controls">
		<select id="street"></select>
		<button id="addStreet">+ Street</button>
		<button id="removeStreet">- Street</button>
		<input type="number" id="houseNumber" placeholder="House number">
		<select id="krant">
			<option>VK</option>
			<option>HD</option>
			<option>NRC</option>
			<option>YC</option>
			<option>HFD</option>
			<option>TEL</option>
			<option>TR</option>
			<option>HP</option>
			<option>AD</option>
			<option>NYT</option>
		</select>
		<select id="action">
			<option value="add">Add</option>
			<option value="bij">Bij</option>
			<option value="af">Af</option>
		</select>
		<select id="days">
	        <option value="mawo">Ma-Wo</option>
	        <option value="week">Ma-Za</option>
	        <option value="dovr">Do-Vr</option>
	        <option value="doza">Do-Za</option>
	        <option value="za">Za</option>
        </select>
		<span id="referenceContainer">
			<select id="reference"></select>
		</span>
		<button id="submit">Submit</button>
		<button id="exportData">Export</button>
        <button id="importData">Import</button>
	</div> </details>

	<ul id="houseList"></ul>
    <div id="importPopup">
	    <div class="importBox">

		    <h2>Import Route</h2>

		    <textarea id="importText" placeholder="Paste exported route here"></textarea>

		    <div class="importOptions">
			    <select id="importDays">
				    <option value="all">All days</option>
				    <option value="mawo">Ma-Wo</option>
				    <option value="dovr">Do-Vr</option>
				    <option value="za">Za</option>
			    </select>

			    <select id="importMode">
			        <option value="replace">Replace</option>
				    <option value="add">Add</option>
			    </select>
		    </div>

		<div class="importButtons">
		    <button id="cancelImport">Cancel</button>
			<button id="confirmImport">Import</button>
		</div>
	</div>
  </div>
    <br>
    <br>
    <br>
    <br>
    <br>
	<script>
		let streets = [];
		let houses = [];

		const street = document.getElementById("street");
		const addStreet = document.getElementById("addStreet");
		const removeStreet = document.getElementById("removeStreet");
		const houseNumber = document.getElementById("houseNumber");
		const krant = document.getElementById("krant");
		const action = document.getElementById("action");
		const days = document.getElementById("days");
		const reference = document.getElementById("reference");
		const referenceContainer = document.getElementById("referenceContainer");
		const submit = document.getElementById("submit");
		const houseList = document.getElementById("houseList");
		const dayView = document.getElementById("dayView");
		const exportData = document.getElementById("exportData");
        const importData = document.getElementById("importData");
        const importPopup = document.getElementById("importPopup");
        const importText = document.getElementById("importText");
        const importDays = document.getElementById("importDays");
        const importMode = document.getElementById("importMode");
        const confirmImport = document.getElementById("confirmImport");
        const cancelImport = document.getElementById("cancelImport");

		function saveData() {
			localStorage.setItem("streets", JSON.stringify(streets));
			localStorage.setItem("houses", JSON.stringify(houses));
		}

		function loadData() {
			const savedStreets = localStorage.getItem("streets");
			const savedHouses = localStorage.getItem("houses");
			if (savedStreets) {
				streets = JSON.parse(savedStreets);
			}
			if (savedHouses) {
	            houses = JSON.parse(savedHouses);

	            houses.forEach(house => {
		            if (Array.isArray(house.kranten)) {
			            house.kranten = {
				            mawo: house.kranten,
				            dovr: [],
				            za: []
			            };
		            }

		            if (typeof house.checked === "boolean") {
			            house.checked = {
				            mawo: house.checked,
				            dovr: false,
				            za: false
			            };
		            }
	            });
            }
		}
        dayView.addEventListener("change", () => {
	        renderList();
        });
        
		function renderStreetList() {
			street.innerHTML = "";
			if (streets.length === 0) {
				let option = document.createElement("option");
				option.textContent = "Add street first";
				option.value = "";
				street.appendChild(option);
				return;
			}
			streets.forEach(name => {
				let option = document.createElement("option");
				option.value = name;
				option.textContent = name;
				street.appendChild(option);
			});
		}

		    function renderReferenceList() {
	            reference.innerHTML = "";

	            houses.filter(h => h.street === street.value).forEach((house) => {
		            let option = document.createElement("option");

		            const krantenText = [...new Set(Object.values(house.kranten).flat())];

		            option.value = houses.indexOf(house);
		            option.textContent = `${house.number} ${krantenText.join("/")}`;

		            reference.appendChild(option);
	            });
            }

            function renderList() {
	            houseList.innerHTML = "";
	            let idCounter = 0;
	            const selectedDay = dayView.value;

	            streets.forEach(streetName => {
		            let heading = document.createElement("h2");
		            heading.textContent = streetName;
		            houseList.appendChild(heading);

		            houses.filter(h => h.street === streetName).forEach(house => {

			            if (house.kranten[selectedDay].length === 0) {
				            return;
			            }

			            let li = document.createElement("li");
			            let uniqueId = `chk-${streetName.replace(/\s/g, '-')}-${house.number}-${idCounter++}`;

			            li.innerHTML = `
				            <div class="houseLeft">
					            <input type="checkbox" id="${uniqueId}">
					            <label for="${uniqueId}">
						            <strong>${house.number} ${house.kranten[selectedDay].join("/")}</strong>
					            </label>
				            </div>
				            <button class="deleteHouse">x</button>
			            `;

			            let checkbox = li.querySelector("input");

			            if (typeof house.checked === "boolean") {
				            house.checked = {
					            mawo: house.checked,
					            dovr: false,
					            za: false
				            };
			            }

			            checkbox.checked = house.checked[selectedDay];

			            checkbox.addEventListener("change", () => {
				            house.checked[selectedDay] = checkbox.checked;
				            saveData();
			            });

			            li.querySelector(".deleteHouse").addEventListener("click", () => {
				            const confirmed = confirm(
					            `Delete house ${house.number} (${house.kranten[selectedDay].join("/")})?`
				            );

				            if (!confirmed) return;

				            houses.splice(houses.indexOf(house), 1);
				            saveData();
				            renderList();
			            });

			            houseList.appendChild(li);
		            });
	            });

	            renderReferenceList();
            }

		action.addEventListener("change", () => {
			referenceContainer.style.display = action.value === "bij" ? "inline" : "none";
			renderReferenceList();
		});

		addStreet.addEventListener("click", () => {
			const name = prompt("Street name:");
			if (!name) return;
			if (streets.includes(name)) {
				alert("Street already exists.");
				return;
			}
			streets.push(name);
			saveData();
			renderStreetList();
			street.value = name;
			renderList();
		});

		removeStreet.addEventListener("click", () => {
			if (!street.value) return;
			const name = street.value;
			const amount = houses.filter(h => h.street === name).length;
			if (amount > 0) {
				const confirmDelete = confirm("This street still has houses. Delete everything?");
				if (!confirmDelete) return;
				houses = houses.filter(h => h.street !== name);
			}
			else {
			    const confirmDelete = confirm("Delete street?");
				if (!confirmDelete) return;
				houses = houses.filter(h => h.street !== name);
			}
			
			streets.splice(streets.indexOf(name), 1);
			saveData();
			renderStreetList();
			renderList();
		});
        
		street.addEventListener("change", () => {
			renderReferenceList();
		});
        function getSelectedDayGroups() {
	        switch (days.value) {
		        case "mawo":
			        return ["mawo"];

		        case "week":
			        return ["mawo", "dovr", "za"];

		        case "dovr":
			        return ["dovr"];

		        case "doza":
			        return ["dovr", "za"];

		        case "za":
			        return ["za"];

		        default:
			        return [];
	        }
        }
        
        function importRoute(data, mode, day) {

	        if (!data.streets || !data.houses) {
		        alert("Invalid route data.");
		        return;
	        }

	        const days = day === "all"
		        ? ["mawo", "dovr", "za"]
		        : [day];

	        if (mode === "replace") {

		        if (day === "all") {
			        streets = [];
			        houses = [];

		        } else {

			        houses.forEach(house => {
				        days.forEach(d => {
					        house.kranten[d] = [];
					        house.checked[d] = false;
				        });
			        });

			        houses = houses.filter(house =>
				        house.kranten.mawo.length ||
				        house.kranten.dovr.length ||
				        house.kranten.za.length
			        );
		        }
	        }


	        data.streets.forEach(name => {
		        if (!streets.includes(name)) {
			        streets.push(name);
		        }
	        });

	        data.houses.forEach(importedHouse => {

		        let existing = houses.find(h =>
			        h.street === importedHouse.street &&
			        h.number == importedHouse.number
		        );


		        if (!existing) {

			        existing = {
				        street: importedHouse.street,
				        number: importedHouse.number,
				        checked: {
					        mawo: false,
					        dovr: false,
					        za: false
				        },
				        kranten: {
					        mawo: [],
					        dovr: [],
					        za: []
				        }
			        };

			        houses.push(existing);
		        }


		        days.forEach(d => {

			        importedHouse.kranten[d].forEach(krant => {

				        if (!existing.kranten[d].includes(krant)) {
					        existing.kranten[d].push(krant);
				        }

			        });

			        existing.kranten[d].sort();

		        });

	        });


	        saveData();
	        renderStreetList();
	        renderList();

	        alert("Import complete.");
        }
        submit.addEventListener("click", () => {
	        if (!street.value) {
		        alert("Add a street first.");
		        return;
	        }

	        const number = houseNumber.value.trim();

	        if (number === "") {
		        alert("Enter a house number.");
		        return;
	        }

	        const selectedKrant = krant.value;
	        const selectedDays = getSelectedDayGroups();

	        if (action.value === "add") {

		        let existing = houses.find(
			        h => h.street === street.value && h.number == number
		        );

		        if (existing) {

			        selectedDays.forEach(day => {
				        if (!existing.kranten[day].includes(selectedKrant)) {
					        existing.kranten[day].push(selectedKrant);
					        existing.kranten[day].sort();
				        }
			        });

		        } else {

			        let newHouse = {
				        street: street.value,
				        number: number,
				        checked: {
					        mawo: false,
					        dovr: false,
					        za: false
				        },
				        kranten: {
					        mawo: [],
					        dovr: [],
					        za: []
				        }
			        };

			        selectedDays.forEach(day => {
				        newHouse.kranten[day].push(selectedKrant);
			        });

			        houses.push(newHouse);
		        }

	        } else if (action.value === "bij") {

		        let existing = houses.find(
			        h => h.street === street.value && h.number == number
		        );

		        if (existing) {

			        selectedDays.forEach(day => {
				        if (!existing.kranten[day].includes(selectedKrant)) {
					        existing.kranten[day].push(selectedKrant);
					        existing.kranten[day].sort();
				        }
			        });

		        } else {

			        let newHouse = {
				        street: street.value,
				        number: number,
				        checked: {
					        mawo: false,
					        dovr: false,
					        za: false
				        },
				        kranten: {
					        mawo: [],
					        dovr: [],
					        za: []
				        }
			        };

			        selectedDays.forEach(day => {
				        newHouse.kranten[day].push(selectedKrant);
			        });

			        let referenceHouse = parseInt(reference.value);

			        if (isNaN(referenceHouse)) {
				        houses.push(newHouse);
			        } else {
				        houses.splice(referenceHouse, 0, newHouse);
			        }
		        }

	        } else if (action.value === "af") {

		        let existing = houses.find(
			        h => h.street === street.value && h.number == number
		        );

		        if (!existing) {
			        alert("House not found.");
			        return;
		        }

		        selectedDays.forEach(day => {
			        let index = existing.kranten[day].indexOf(selectedKrant);

			        if (index !== -1) {
				        existing.kranten[day].splice(index, 1);
			        }
		        });

		        const hasAnyKranten =
			        existing.kranten.mawo.length ||
			        existing.kranten.dovr.length ||
			        existing.kranten.za.length;

		        if (!hasAnyKranten) {
			        houses.splice(houses.indexOf(existing), 1);
		        }
	        }

	        saveData();
	        renderList();

	        houseNumber.value = "";
	        houseNumber.focus();
        });
        
        exportData.addEventListener("click", async () => {

	        const exportObject = {
		        version: 1,
		        streets,
		        houses
	        };

	        const text = JSON.stringify(exportObject);

	        await navigator.clipboard.writeText(text);

	        alert("Route copied!");

        });

        cancelImport.addEventListener("click", () => {
	        importPopup.style.display = "none";
	        importText.value = "";
        });


        confirmImport.addEventListener("click", () => {

	        let data;

	        try {
		        data = JSON.parse(importText.value);
	        } catch {
		        alert("Invalid route data.");
		        return;
	        }

	        importRoute(
		        data,
		        importMode.value,
		        importDays.value
	        );

	        importPopup.style.display = "none";
	        importText.value = "";

        });

        importData.addEventListener("click", () => {
	        importPopup.style.display = "flex";
        });
        
		loadData();
		renderStreetList();
		renderList();
	</script>

</body>
</html>
